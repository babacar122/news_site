{% extends 'base.html' %}

{% block title %}Supprimer l'article - NewsHub{% endblock %}

{% block content %}
<div class="card border-danger">
    <div class="card-header bg-danger text-white">
        <h3 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirmation de suppression</h3>
    </div>
    <div class="card-body">
        <p class="lead">Êtes-vous sûr de vouloir supprimer l'article :</p>
        <h4>"{{ object.title }}" ?</h4>
        <p class="text-muted">Cette action est irréversible.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'article_detail' object.pk %}" class="btn btn-outline-secondary">
                    <i class="fas fa-times"></i> Annuler
                </a>
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-trash"></i> Confirmer la suppression
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
